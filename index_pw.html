<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VRP Matrix Builder & Optimizer</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <script src="https://unpkg.com/lucide@latest"></script>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        /* Base styles to match React's default sans-serif look */
        body { font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; }
        .hidden { display: none !important; }
    </style>
</head>
<body class="min-h-screen bg-gray-50 flex flex-col">

    <header class="bg-blue-900 text-white p-4 shadow-md flex items-center justify-between">
        <div class="flex items-center space-x-2">
            <i data-lucide="network" class="w-6 h-6"></i>
            <h1 class="text-xl font-bold tracking-wide">VRP Matrix Builder & Optimizer</h1>
        </div>
    </header>

    <main class="flex-1 max-w-6xl w-full mx-auto p-6 grid grid-cols-1 md:grid-cols-3 gap-6">

        <div class="col-span-1 space-y-4">
            <div class="bg-white p-5 rounded-xl shadow-sm border border-gray-200">
                <h2 class="text-lg font-semibold mb-4 flex items-center text-gray-800">
                    <i data-lucide="settings" class="w-5 h-5 mr-2 text-blue-600"></i> Optimization Params
                </h2>
                <div class="space-y-4 text-sm">
                    <div class="bg-blue-50 p-3 rounded border border-blue-200">
                        <label class="flex items-center text-blue-800 mb-1 font-semibold"><i data-lucide="users" class="w-4 h-4 mr-1"></i> Fleet Size</label>
                        <p class="text-xs text-blue-700">Auto-optimized to find the minimum workers needed.</p>
                    </div>
                    <div class="grid grid-cols-2 gap-2">
                        <div>
                            <label class="flex items-center text-gray-600 mb-1"><i data-lucide="clock" class="w-4 h-4 mr-1"></i> Daily Hrs</label>
                            <input type="number" id="param-dailyHours" value="8" class="w-full p-2 border rounded-md outline-none focus:border-blue-400" />
                        </div>
                        <div>
                            <label class="flex items-center text-gray-600 mb-1"><i data-lucide="map-pin" class="w-4 h-4 mr-1"></i> Stay (Min)</label>
                            <input type="number" id="param-stayTime" value="15" class="w-full p-2 border rounded-md outline-none focus:border-blue-400" />
                        </div>
                    </div>
                    <div>
                        <label class="flex items-center text-gray-600 mb-1">
                            <i data-lucide="activity" class="w-4 h-4 mr-1"></i> Max Walk Dist (m)
                        </label>
                        <input type="number" id="param-maxWalk" value="1000" class="w-full p-2 border rounded-md outline-none focus:border-blue-400" />
                    </div>

                    <div class="pt-2 border-t mt-4">
                        <label class="flex items-center text-gray-800 font-medium mb-2 cursor-pointer">
                            <input type="checkbox" id="param-lunch" checked class="mr-2 rounded text-blue-600" />
                            Include Lunch Break
                        </label>
                    </div>
                </div>
            </div>
        </div>

        <div class="col-span-2 space-y-6">

            <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-200">
                <h2 class="text-xl font-semibold mb-4 flex items-center">
                    <span class="bg-blue-100 text-blue-800 w-8 h-8 rounded-full flex items-center justify-center mr-3">1</span>
                    Locations
                </h2>

                <div class="space-y-3 mb-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Start Location (Optional)</label>
                        <input type="text" id="start-address" placeholder="Leave empty for flexible start" class="w-full p-2 border rounded-md text-sm outline-none focus:border-blue-500" />
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">End Location (Optional)</label>
                        <input type="text" id="end-address" placeholder="Leave empty for flexible end" class="w-full p-2 border rounded-md text-sm outline-none focus:border-blue-500" />
                    </div>
                </div>

                <label class="block text-sm font-medium text-gray-700 mb-1">Job Locations (1 per line)</label>
                <textarea id="raw-addresses" class="w-full h-32 p-3 border rounded-md text-sm font-mono bg-gray-50 focus:bg-white outline-none">International Commerce Centre, 1 Austin Road West, Tsim Sha Tsui
Alexandra House, 18 Chater Road, Central
Amoy Gardens Block B, 77 Ngau Tau Kok Road, Kowloon Bay
Taikoo Shing Orchid Mansion, Taikooshing Road, Taikooshing
Langham Place Office Tower, 8 Argyle Street, Mong Kok
Custom Coordinate Test 1, 22.3190, 114.1694
Custom Coordinate Test 2, 22.27604, 114.14546
Metroplaza Tower 1, 223 Hing Fong Road, Kwai Fong</textarea>

                <div class="mt-4 flex justify-end">
                    <button id="btn-geocode" onclick="processAddresses()" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2 rounded-md font-medium flex items-center disabled:opacity-50 transition-colors">
                        <span id="btn-geocode-text">Start Geocoding</span>
                        <i data-lucide="upload-cloud" class="w-4 h-4 ml-2" id="btn-geocode-icon"></i>
                    </button>
                </div>
            </div>

            <div id="geocoding-results-container" class="hidden bg-white p-6 rounded-xl shadow-sm border">
                <h3 class="font-semibold mb-3 flex items-center text-gray-800">
                    <i id="geo-status-icon" class="w-5 h-5 mr-2"></i>
                    Geocoding Results
                </h3>
                <ul id="geocoding-list" class="space-y-3 max-h-60 overflow-y-auto pr-2"></ul>
            </div>

            <div id="step-2-container" class="hidden bg-white p-6 rounded-xl shadow-sm border border-gray-200">
                <h2 class="text-xl font-semibold mb-2 flex items-center">
                    <span class="bg-blue-900 text-white w-8 h-8 rounded-full flex items-center justify-center mr-3">2</span>
                    Build Network Graph
                </h2>

                <button id="btn-build-matrix" onclick="buildMatrix()" class="w-full bg-slate-800 hover:bg-slate-700 text-white py-3 rounded-lg font-semibold flex items-center justify-center mb-4 transition-colors">
                    <i data-lucide="play" class="w-5 h-5 mr-2"></i> <span id="btn-build-text">Compute Graph</span>
                </button>

                <div id="matrix-progress-container" class="hidden w-full bg-gray-100 rounded-full h-4 mb-2 overflow-hidden shadow-inner">
                    <div id="matrix-progress-bar" class="bg-blue-600 h-4 rounded-full transition-all duration-300 ease-out" style="width: 0%"></div>
                </div>
                <p id="matrix-progress-text" class="hidden text-xs text-gray-600 mt-2 font-mono flex items-center">
                    <i data-lucide="loader" class="w-3 h-3 animate-spin mr-2"></i> <span>Initializing...</span>
                </p>

                <div id="network-map-wrapper" class="hidden mt-4">
                    <div id="network-map" class="w-full border rounded-lg overflow-hidden relative z-0" style="height: 400px;"></div>

                    <button id="btn-optimize" onclick="runOptimization()" class="w-full bg-green-600 hover:bg-green-700 text-white py-3 rounded-lg font-bold shadow flex items-center justify-center mt-4 transition-colors">
                        <span id="btn-optimize-text">Proceed to Optimization Engine</span>
                    </button>

                    <div id="opt-progress-container" class="hidden w-full bg-gray-100 rounded-full h-4 mt-4 overflow-hidden shadow-inner">
                        <div id="opt-progress-bar" class="bg-green-500 h-4 rounded-full transition-all duration-300 ease-out" style="width: 0%"></div>
                    </div>
                    <p id="opt-progress-text" class="hidden text-xs text-gray-600 mt-2 font-mono flex items-center">
                        <i data-lucide="loader" class="w-3 h-3 animate-spin mr-2"></i> <span>Initializing...</span>
                    </p>
                </div>
            </div>

            <div id="step-4-container" class="hidden bg-green-50 p-6 rounded-xl shadow-sm border border-green-500">
                <h2 class="text-xl font-semibold mb-4 text-green-900 flex items-center">
                    <i data-lucide="check-square" class="w-6 h-6 mr-2"></i> Optimal Routes Generated
                </h2>

                <div id="skipped-nodes-container" class="hidden mb-4 p-3 bg-red-100 border border-red-300 rounded text-sm text-red-800">
                    <p class="font-bold flex items-center mb-1"><i data-lucide="alert-triangle" class="w-4 h-4 mr-1"></i> Skipped Locations (Time limit physically exceeded):</p>
                    <ul id="skipped-nodes-list" class="list-disc pl-5"></ul>
                </div>

                <div id="route-map" class="w-full border border-green-300 rounded-lg overflow-hidden relative z-0 mb-4 shadow-sm" style="height: 500px;"></div>

                <div id="route-text-summaries" class="space-y-3"></div>
            </div>

        </div>
    </main>

    <script>
        // Initialize Lucide Icons
        lucide.createIcons();

        // Constants
        const API_BASE = 'http://127.0.0.1:5001';
        const WORKER_COLORS = ['#e6194B', '#3cb44b', '#4363d8', '#f58231', '#911eb4', '#42d4f4', '#f032e6', '#bfef45', '#fabed4', '#469990'];

        // State Variables
        let locations = [];
        let graphData = null;
        let routes = null;
        let skippedNodes = [];

        // Leaflet Map Instances
        let networkMapInstance = null;
        let routeMapInstance = null;

        function getParams() {
            return {
                dailyHours: parseInt(document.getElementById('param-dailyHours').value),
                stayTimeMins: parseInt(document.getElementById('param-stayTime').value),
                maxWalkDist: parseInt(document.getElementById('param-maxWalk').value),
                lunchBreak: document.getElementById('param-lunch').checked,
                lunchStart: '12:00',
                lunchDuration: 45
            };
        }

        function formatTime(seconds) {
            if (seconds >= 999999) return "No Route Found";
            if (seconds <= 0) return "0 mins";
            const mins = Math.round(seconds / 60);
            return mins > 60 ? `${(mins/60).toFixed(1)} hrs` : `${mins} mins`;
        }

        function getMapBounds(locs) {
            const validLocs = locs.filter(l => l.status !== 'dummy');
            if (!validLocs.length) return [[22.2, 114.1], [22.4, 114.2]];
            const lats = validLocs.map(l => parseFloat(l.lat));
            const lons = validLocs.map(l => parseFloat(l.lon));
            return [
                [Math.min(...lats) - 0.01, Math.min(...lons) - 0.01],
                [Math.max(...lats) + 0.01, Math.max(...lons) + 0.01]
            ];
        }

        function setGeocodingLoading(isLoading) {
            const btn = document.getElementById('btn-geocode');
            const txt = document.getElementById('btn-geocode-text');
            const icon = document.getElementById('btn-geocode-icon');

            btn.disabled = isLoading;
            if (isLoading) {
                txt.innerText = 'Geocoding...';
                icon.classList.add('hidden');
                btn.classList.add('opacity-50');
            } else {
                txt.innerText = 'Start Geocoding';
                icon.classList.remove('hidden');
                btn.classList.remove('opacity-50');
            }
        }

        async function processAddresses() {
            setGeocodingLoading(true);
            document.getElementById('step-2-container').classList.add('hidden');
            document.getElementById('step-4-container').classList.add('hidden');

            const startAddress = document.getElementById('start-address').value;
            const endAddress = document.getElementById('end-address').value;
            const rawAddrs = document.getElementById('raw-addresses').value.split('\n').filter(a => a.trim() !== '');

            const toGeocode = [];
            if (startAddress.trim()) toGeocode.push(startAddress.trim());
            if (endAddress.trim()) toGeocode.push(endAddress.trim());
            toGeocode.push(...rawAddrs);

            try {
                const response = await fetch(`${API_BASE}/geocode`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ addresses: toGeocode })
                });

                if (!response.ok) throw new Error(`Geocoding failed: ${response.status}`);
                const data = await response.json();

                locations = [];
                let geoIndex = 0;

                if (startAddress.trim()) {
                    locations.push({ ...data.results[geoIndex], id: 0 });
                    geoIndex++;
                } else {
                    locations.push({ id: 0, originalAddress: 'Flexible Start', status: 'dummy', lat: '0', lon: '0', name: 'Flexible Start' });
                }

                if (endAddress.trim()) {
                    locations.push({ ...data.results[geoIndex], id: 1 });
                    geoIndex++;
                } else {
                    locations.push({ id: 1, originalAddress: 'Flexible End', status: 'dummy', lat: '0', lon: '0', name: 'Flexible End' });
                }

                for (let i = 0; i < rawAddrs.length; i++) {
                    locations.push({ ...data.results[geoIndex], id: i + 2 });
                    geoIndex++;
                }

                renderGeocodingResults();
            } catch (error) {
                alert(`Failed to connect to the Python backend: ${error.message}`);
            } finally {
                setGeocodingLoading(false);
            }
        }

        function handleManualFix(id) {
            const latVal = document.getElementById(`manual-lat-${id}`).value;
            const lonVal = document.getElementById(`manual-lon-${id}`).value;

            const parsedLat = parseFloat(latVal);
            const parsedLon = parseFloat(lonVal);

            if (isNaN(parsedLat) || isNaN(parsedLon)) {
                alert("Please enter valid numerical coordinates.");
                return;
            }

            locations = locations.map(loc => {
                if (loc.id === id) {
                    return { ...loc, lat: parsedLat.toString(), lon: parsedLon.toString(), status: 'ok', name: `${loc.originalAddress} (Manual)` };
                }
                return loc;
            });

            renderGeocodingResults();
        }

        function renderGeocodingResults() {
            const container = document.getElementById('geocoding-results-container');
            const list = document.getElementById('geocoding-list');
            const icon = document.getElementById('geo-status-icon');

            container.classList.remove('hidden', 'border-red-300', 'border-green-300');
            list.innerHTML = '';

            const hasErrors = locations.some(loc => loc.status === 'error');
            const allResolved = locations.length > 0 && !hasErrors;

            if (hasErrors) {
                container.classList.add('border-red-300');
                icon.setAttribute('data-lucide', 'alert-triangle');
                icon.classList.add('text-red-500');
                icon.classList.remove('text-green-500');
            } else {
                container.classList.add('border-green-300');
                icon.setAttribute('data-lucide', 'check-circle');
                icon.classList.remove('text-red-500');
                icon.classList.add('text-green-500');
            }

            lucide.createIcons();

            locations.filter(l => l.status !== 'dummy').forEach(loc => {
                const li = document.createElement('li');
                li.className = `p-3 border rounded-lg text-sm flex justify-between items-start ${loc.status === 'error' ? 'bg-red-50 border-red-200' : 'bg-gray-50 border-gray-200'}`;

                let tags = '';
                if(loc.id === 0) tags = `<span class="bg-green-100 text-green-800 px-2 py-0.5 rounded text-xs mr-2">Start</span>`;
                if(loc.id === 1) tags = `<span class="bg-red-100 text-red-800 px-2 py-0.5 rounded text-xs mr-2">End</span>`;

                let content = `<div class="w-full"><p class="font-medium text-gray-800">${tags}${loc.originalAddress}</p>`;

                if (loc.status === 'ok') {
                    content += `<p class="text-green-600 mt-1 font-mono text-xs">Lat: ${loc.lat}, Lon: ${loc.lon}</p>`;
                } else {
                    content += `
                        <div class="mt-3 flex flex-wrap gap-2 items-center">
                            <p class="text-red-600 text-xs w-full mb-1">Failed to find location. Please provide coordinates:</p>
                            <input type="text" id="manual-lat-${loc.id}" placeholder="Latitude" class="p-1.5 border border-red-300 rounded outline-none focus:border-red-500 w-36" />
                            <input type="text" id="manual-lon-${loc.id}" placeholder="Longitude" class="p-1.5 border border-red-300 rounded outline-none focus:border-red-500 w-36" />
                            <button onclick="handleManualFix(${loc.id})" class="bg-red-600 hover:bg-red-700 text-white px-3 py-1.5 rounded transition-colors">Save</button>
                        </div>
                    `;
                }
                content += `</div>`;
                li.innerHTML = content;
                list.appendChild(li);
            });

            if (allResolved) {
                document.getElementById('step-2-container').classList.remove('hidden');
                document.getElementById('btn-build-text').innerText = 'Compute Graph';
            } else {
                document.getElementById('step-2-container').classList.add('hidden');
            }
        }

        async function buildMatrix() {
            const btn = document.getElementById('btn-build-matrix');
            const pCont = document.getElementById('matrix-progress-container');
            const pBar = document.getElementById('matrix-progress-bar');
            const pText = document.getElementById('matrix-progress-text');
            const mapWrap = document.getElementById('network-map-wrapper');
            const txtSpan = document.getElementById('matrix-progress-text').querySelector('span');

            btn.disabled = true;
            btn.classList.add('bg-slate-400');
            pCont.classList.remove('hidden');
            pText.classList.remove('hidden');
            mapWrap.classList.add('hidden');

            try {
                const response = await fetch(`${API_BASE}/build-matrix`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ locations, params: getParams() })
                });

                if (!response.ok) throw new Error(`Matrix build failed: ${response.status}`);

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let buffer = '';

                while (true) {
                    const { value, done } = await reader.read();
                    if (done) break;

                    buffer += decoder.decode(value, { stream: true });
                    const lines = buffer.split('\n');
                    buffer = lines.pop();

                    for (const line of lines) {
                        if (line.trim()) {
                            const data = JSON.parse(line);
                            if (data.type === 'progress') {
                                pBar.style.width = `${data.percent}%`;
                                txtSpan.innerText = data.message;
                            } else if (data.type === 'complete') {
                                graphData = data;
                                pBar.style.width = `100%`;
                                txtSpan.innerText = 'Matrix calculation complete!';
                                renderNetworkMap();
                            }
                        }
                    }
                }
            } catch (error) {
                console.error("Matrix generation failed:", error);
                alert("Failed to build matrix");
            } finally {
                btn.disabled = false;
                btn.classList.remove('bg-slate-400');
                document.getElementById('btn-build-text').innerText = 'Re-Compute Graph';
                pCont.classList.add('hidden');
                pText.classList.add('hidden');
            }
        }

        function renderNetworkMap() {
            document.getElementById('network-map-wrapper').classList.remove('hidden');

            if (networkMapInstance) {
                networkMapInstance.off();
                networkMapInstance.remove();
            }

            networkMapInstance = L.map('network-map');
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(networkMapInstance);

            const bounds = getMapBounds(locations);
            networkMapInstance.fitBounds(bounds);

            graphData.edges.forEach(edge => {
                const from = locations.find(l => l.id === edge.source);
                const to = locations.find(l => l.id === edge.target);
                if (!from || !to || from.status === 'dummy' || to.status === 'dummy') return;

                const polyline = L.polyline([[from.lat, from.lon], [to.lat, to.lon]], {
                    color: '#64748b', weight: 3, opacity: 0.5
                }).addTo(networkMapInstance);

                polyline.bindTooltip(`
                    <div class="text-xs font-semibold">
                        <p>From: ${from.name}</p>
                        <p>To: ${to.name}</p>
                        <p class="text-blue-600 mt-1">Est. Transit: ${formatTime(edge.time_seconds)}</p>
                    </div>
                `, {sticky: true});
            });

            locations.filter(l => l.status !== 'dummy').forEach(loc => {
                let fColor = "#3b82f6";
                if (loc.id === 0) fColor = "#22c55e";
                if (loc.id === 1) fColor = "#ef4444";

                L.circleMarker([loc.lat, loc.lon], {
                    radius: loc.id < 2 ? 8 : 5, color: "white", weight: 2, fillColor: fColor, fillOpacity: 1
                }).addTo(networkMapInstance).bindTooltip(loc.name);
            });
        }

        async function runOptimization() {
            const btn = document.getElementById('btn-optimize');
            const txt = document.getElementById('btn-optimize-text');
            const pCont = document.getElementById('opt-progress-container');
            const pBar = document.getElementById('opt-progress-bar');
            const pText = document.getElementById('opt-progress-text');
            const txtSpan = pText.querySelector('span');

            btn.disabled = true;
            btn.classList.add('bg-green-400');
            pCont.classList.remove('hidden');
            pText.classList.remove('hidden');

            let timerPercent = 0;
            const interval = setInterval(() => {
                timerPercent += 10;
                if (timerPercent <= 90) {
                    pBar.style.width = `${timerPercent}%`;
                    txtSpan.innerText = 'Exploring solution branches (Metaheuristic GLS)...';
                }
            }, 1000);

            try {
                const response = await fetch(`${API_BASE}/optimize`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ locations, matrix: graphData.matrix, params: getParams() })
                });

                clearInterval(interval);
                if (!response.ok) throw new Error(`Optimization failed: ${response.status}`);

                const data = await response.json();
                routes = data.routes;
                skippedNodes = data.skipped_nodes || [];

                renderRouteResults();
                txt.innerText = 'Re-Run Optimization (Apply New Params)';
            } catch (error) {
                clearInterval(interval);
                console.error("Optimization failed:", error);
                alert("Optimization Failed.");
            } finally {
                btn.disabled = false;
                btn.classList.remove('bg-green-400');
                pCont.classList.add('hidden');
                pText.classList.add('hidden');
                pBar.style.width = '0%';
            }
        }

        function renderRouteResults() {
            document.getElementById('step-4-container').classList.remove('hidden');

            // Handle Skipped Nodes
            const skippedCont = document.getElementById('skipped-nodes-container');
            const skippedList = document.getElementById('skipped-nodes-list');
            if (skippedNodes.length > 0) {
                skippedCont.classList.remove('hidden');
                skippedList.innerHTML = '';
                skippedNodes.forEach(nodeId => {
                    const loc = locations.find(l => l.id === nodeId);
                    const li = document.createElement('li');
                    li.innerText = loc ? loc.name : nodeId;
                    skippedList.appendChild(li);
                });
            } else {
                skippedCont.classList.add('hidden');
            }

            // Handle Map
            if (routeMapInstance) {
                routeMapInstance.off();
                routeMapInstance.remove();
            }

            routeMapInstance = L.map('route-map');
            L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png').addTo(routeMapInstance);
            routeMapInstance.fitBounds(getMapBounds(locations));

            routes.forEach((route, i) => {
                const color = WORKER_COLORS[route.worker_id % WORKER_COLORS.length];

                route.edges.forEach(edge => {
                    const fromLoc = locations.find(l => l.id === edge.from_node);
                    const toLoc = locations.find(l => l.id === edge.to_node);
                    if (!fromLoc || !toLoc || fromLoc.status === 'dummy' || toLoc.status === 'dummy') return;

                    const polyline = L.polyline([[fromLoc.lat, fromLoc.lon], [toLoc.lat, toLoc.lon]], {
                        color: color, weight: 4, opacity: 0.8
                    }).addTo(routeMapInstance);

                    polyline.bindTooltip(`
                        <div class="text-xs">
                            <p class="font-bold">Worker ${route.worker_id + 1}</p>
                            <p>To: ${toLoc.name}</p>
                            <p class="text-green-700">Travel time: ${formatTime(edge.cost_seconds)}</p>
                        </div>
                    `, {sticky: true});
                });

                // Nodes
                const nodesToDraw = route.edges.map(e => e.from_node).concat([1]);
                nodesToDraw.forEach(nodeId => {
                    const loc = locations.find(l => l.id === nodeId);
                    if (!loc || loc.status === 'dummy') return;

                    let fColor = color;
                    if (loc.id === 0) fColor = "#22c55e";
                    if (loc.id === 1) fColor = "#ef4444";

                    L.circleMarker([loc.lat, loc.lon], {
                        radius: loc.id < 2 ? 8 : 5, color: "white", weight: 2, fillColor: fColor, fillOpacity: 1
                    }).addTo(routeMapInstance).bindTooltip(`Worker ${route.worker_id + 1}: ${loc.name}`);
                });
            });

            // Handle Text Summaries
            const sumCont = document.getElementById('route-text-summaries');
            sumCont.innerHTML = '';

            routes.forEach(route => {
                const color = WORKER_COLORS[route.worker_id % WORKER_COLORS.length];
                const div = document.createElement('div');
                div.className = "bg-white border rounded p-3 text-sm shadow-sm border-l-4";
                div.style.borderLeftColor = color;

                let innerHTML = `
                    <p class="font-bold text-gray-800 mb-2">
                        Worker ${route.worker_id + 1}
                        <span class="text-gray-500 font-normal ml-2">(${(route.time_seconds / 3600).toFixed(1)} hrs shift, ${route.stops} stops)</span>
                    </p>
                    <div class="flex flex-wrap items-center text-gray-600">
                `;

                route.edges.forEach((edge, idx) => {
                    const isStart = idx === 0;
                    const fromLoc = locations.find(l => l.id === edge.from_node);
                    const toLoc = locations.find(l => l.id === edge.to_node);

                    if (isStart) {
                        const startClass = fromLoc.status === 'dummy' ? 'bg-gray-400' : 'bg-green-600';
                        innerHTML += `<span class="px-2 py-0.5 rounded text-xs text-white ${startClass}">${fromLoc.name}</span>`;
                    }

                    innerHTML += `<span class="mx-1 text-gray-400">→</span>`;

                    let toClass = '';
                    if (toLoc.id === 1) {
                        toClass = toLoc.status === 'dummy' ? 'bg-gray-400 text-white px-2 py-0.5 rounded text-xs' : 'bg-red-500 text-white px-2 py-0.5 rounded text-xs';
                    }
                    innerHTML += `<span class="px-1 ${toClass}">${toLoc ? toLoc.name.substring(0,15) : edge.to_node}</span>`;
                });

                innerHTML += `</div>`;
                div.innerHTML = innerHTML;
                sumCont.appendChild(div);
            });
        }
    </script>
</body>
</html>
